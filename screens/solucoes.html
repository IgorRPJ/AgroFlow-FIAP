<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Soluções | AgroFlow</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="/css/style.css">

    <link rel="stylesheet" href="/css/solucoes.css">

</head>

<body>

    <div id="header"></div>

    <main>

        <!-- HERO -->
        <section class="hero-section py-5">

            <div class="container py-5 text-center">

                <h1 class="display-4 fw-bold mb-4">

                    Nossas
                    <span class="text-success">

                        Soluções

                    </span>

                </h1>

                <p class="lead text-secondary mx-auto hero-text">

                    Tecnologia modular que se adapta às necessidades da sua propriedade,
                    desde pequenos produtores até grandes operações agrícolas.

                </p>

            </div>

        </section>

        <!-- SOLUÇÕES -->
        <section class="py-5 bg-white">

            <div class="container">

                <div class="text-center mb-5">

                    <h2 class="fw-bold display-6 mb-3">

                        Soluções Modulares

                    </h2>

                    <p class="lead text-secondary">

                        Escolha as ferramentas que sua fazenda precisa

                    </p>

                </div>

                <div class="row g-4" id="solutionsContainer"></div>

            </div>

        </section>

        <!-- PACOTES -->
        <section class="py-5 bg-light">

            <div class="container">

                <div class="text-center mb-5">

                    <h2 class="fw-bold display-6 mb-3">

                        Pacotes Integrados

                    </h2>

                    <p class="lead text-secondary">

                        Ou escolha um pacote completo para sua operação

                    </p>

                </div>

                <div class="row g-4" id="packagesContainer"></div>

            </div>

        </section>

    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/js/components.js"></script>

    <script src="/js/solucoes.js"></script>

</body>

</html>
